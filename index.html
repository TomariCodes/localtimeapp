<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Time App</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.1/moment-timezone-with-data-1970-2030.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select id="select">
        <option value="">Select a city</option>
         <option value="current">My Location</option>
         <option value="Europe/London">London</option>
         <option value="Europe/Paris">Paris</option>
         <option value="Pacific/Auckland">Auckland</option>
         <option value="Pacific/Honolulu">Honolulu</option>
         <option value="America/Boston">Boston</option>
        <option value="America/New_York">New York</option>
        <option value="Asia/Tokyo">Tokyo</option>
        <option value="Asia/Seoul">Seoul</option>
      </select>
      <div id="cities">
        <div class="city" id="los-angeles">
          <div class="city-info">
            <h2>Los Angeles</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div class="city" id="london">
          <div class="city-info">
            <h2>London</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>
    </div>

    <footer>
      This AI project was coded by
      <a href="https://github.com/TomariCodes" target="_blank"
        >Tomari Southern</a
      >
      and is
      <a href="https://github.com/TomariCodes/localtimeapp" target="_blank">
        open-sourced on Github</a
      >
      and is
      <a href="https://localtimezoneapp.netlify.app/" target="_blank"
        >hosted on Netlify</a
      >
    </footer>
    <script src="script/main.js"></script>
  </body>
</html>
