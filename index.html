<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Time App</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.1/moment-timezone-with-data-1970-2030.min.js"></script>
  </head>
<body>
    <div class="container">
      <h1>World Clock</h1>

      <select>
        <option value="">Select a city</option>
        <option value="">London</option>
        <option value="">New York</option>
        <option value="">Tokyo</option>
      </select>

      <div class="city" id="los-angeles">
        <div class="city-info" >
          <h2>Los Angeles</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
      <div class="city" id="london">
        <div class="city-info" >
          <h2>London</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
    </div>

    <footer> 
         This AI project was coded by
        <a href="https://github.com/TomariCodes" target="_blank"
          >Tomari Southern</a
        >
        and is <a
          href="https://github.com/TomariCodes/localtimeapp"
          target="_blank"
        >
          open-sourced on Github</a
        >
        and is
        <a href="https://localtimezoneapp.netlify.app/" target="_blank"
          >hosted on Netlify</a
        ></footer>
        <script src="script/main.js"></script>
</body>
</html>
